<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDDY.TION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            overflow-y: scroll;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            background: #000;
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            height: 488px;
            padding: 0 24px;
            align-items: flex-start;
            gap: 10px;
            flex-shrink: 0;
            align-self: stretch;
            width: 100%;
        }

        .hero-text {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 60px;
            font-style: normal;
            font-weight: 600;
            line-height: 112%;
            letter-spacing: -2px;
        }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            width: 100%;
            height: 100px;
            padding: 0 24px;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            z-index: 100;
            background: linear-gradient(0deg, #000 -58%, rgba(0, 0, 0, 0.00) 81.5%);
            transition: height 0.3s ease, padding 0.3s ease;
        }

        .nav-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            height: 100%;
            transition: gap 0.3s ease;
        }

        .logo {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 700;
            line-height: 100%;
            text-decoration: none;
            transition: opacity 0.3s, font-size 0.3s ease;
            justify-self: start;
        }

        .logo:hover {
            opacity: 0.6;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
            justify-self: center;
            transition: gap 0.3s ease;
        }

        .nav-links a {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 500;
            line-height: 100%;
            text-decoration: none;
            transition: opacity 0.3s, font-size 0.3s ease;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        .social-links {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-self: end;
            transition: gap 0.3s ease;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
        }

        .social-links a:hover {
            opacity: 0.6;
        }

        .social-links svg {
            transition: width 0.3s ease, height 0.3s ease;
        }

        /* Works Section */
        .works-section {
            display: flex;
            width: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 380.5px;
            background: #FFF;
            padding: 100px 0;
        }

        .works-header {
            display: flex;
            height: 360px;
            padding: 0 24px;
            align-items: flex-start;
            gap: 10px;
            align-self: stretch;
            width: 100%;
        }

        .works-title {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 100px;
            font-style: normal;
            font-weight: 600;
            line-height: 98%;
            letter-spacing: -3px;
        }

        .project-card {
            display: flex;
            padding: 36.5px 24px;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            align-self: stretch;
            width: 100%;
        }

        .project-image {
            width: 100%;
            padding-bottom: 100%;
            background: #D9D9D9;
            margin-bottom: 24px;
            position: relative;
        }

        .project-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .project-title {
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 60px;
            font-style: normal;
            font-weight: 600;
            line-height: 112%;
            letter-spacing: -2px;
        }

        .project-meta {
            display: flex;
            gap: 16px;
        }

        .project-category {
            color: #9C9C9C;
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-style: normal;
            font-weight: 400;
            line-height: 121%;
            letter-spacing: -0.5px;
        }

        .project-date {
            color: #9C9C9C;
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-style: normal;
            font-weight: 400;
            line-height: 121%;
            letter-spacing: -0.5px;
        }

        .project-grid {
            display: flex;
            padding: 0 24px 36.5px 24px;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            align-self: stretch;
            width: 100%;
        }

        .project-grid-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
        }

        .project-grid-item {
            background: #D9D9D9;
            width: 100%;
            padding-bottom: 100%;
            position: relative;
        }

        /* Responsive */
        @media (min-width: 769px) {
            .hero-content,
            nav,
            .works-header,
            .project-card,
            .project-grid {
                padding-left: 4vw;
                padding-right: 4vw;
            }
        }

        @media (min-width: 1440px) {
            .hero-content,
            nav,
            .works-header,
            .project-card,
            .project-grid {
                padding-left: 6vw;
                padding-right: 6vw;
            }
        }

        @media (min-width: 1920px) {
            .hero-content,
            nav,
            .works-header,
            .project-card,
            .project-grid {
                padding-left: 8vw;
                padding-right: 8vw;
            }
        }

        @media (max-width: 1200px) {
            .hero-text {
                font-size: 48px;
            }

            .works-section {
                gap: 200px;
            }
        }

        @media (max-width: 1024px) {
            .works-section {
                gap: 150px;
            }
        }

        @media (max-width: 900px) {
            .works-section {
                gap: 120px;
            }
        }

        @media (max-width: 1024px) {
            .nav-links {
                gap: 60px;
            }
        }

        @media (max-width: 900px) {
            .nav-links {
                gap: 40px;
            }
        }

        @media (max-width: 768px) {
            .hero-text {
                font-size: 36px;
                line-height: 120%;
            }

            .hero-content {
                padding: 0 24px;
                height: auto;
            }

            .nav-links {
                gap: 30px;
            }

            .nav-links a {
                font-size: 20px;
            }

            .logo {
                font-size: 20px;
            }

            .social-links svg {
                width: 26px;
                height: 26px;
            }
        }

        @media (max-width: 600px) {
            nav {
                height: auto;
                padding: 24px;
            }

            .nav-container {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .logo {
                justify-self: start;
            }

            .nav-links {
                gap: 24px;
                justify-self: start;
            }

            .social-links {
                justify-self: start;
            }

            .nav-links a {
                font-size: 16px;
            }

            .logo {
                font-size: 16px;
            }

            .social-links {
                gap: 12px;
            }

            .social-links svg {
                width: 24px;
                height: 24px;
            }
        }

            .works-section {
                gap: 100px;
                padding: 60px 0;
            }

            .works-header {
                padding-left: 24px;
                padding-right: 24px;
            }

            .project-card {
                padding-left: 24px;
                padding-right: 24px;
            }

            .project-grid {
                padding-left: 24px;
                padding-right: 24px;
            }

            .project-title {
                font-size: 40px;
            }

            .project-grid-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .project-grid-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .project-title {
                font-size: 32px;
            }

            .project-category,
            .project-date {
                font-size: 16px;
            }

            .project-grid-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
