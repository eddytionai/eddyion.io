<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDDY.TION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: url('background.png') center center / cover no-repeat;
        }



        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 1.8%;
            z-index: 100;
            overflow: visible;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.4) 50%, transparent 100%);
        }

        .logo {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            justify-self: start;
            opacity: 0.9;
        }

        .nav-links {
            display: flex;
            gap: 9vw;
            justify-self: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1.125rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        .social-links {
            display: flex;
            gap: 0.7rem;
            align-items: center;
            justify-self: end;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
        }

        .social-links a:hover {
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 1.5rem;
                padding: 1.5rem;
            }

            .nav-links {
                position: static;
                transform: none;
            }

            .nav-links {
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero"></div>

    <nav>
        <div class="logo">EDDY.TION</div>
        <div class="nav-links">
            <a href="#work">Work</a>
