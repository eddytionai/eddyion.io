    <title>About - EDDY.TION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            overflow-y: scroll;
        }

        .content-wrapper {
            padding: 0 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* About Section */
        .about-section {
            display: flex;
            width: 100%;
            padding: 73px 0;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            flex: 1;
        }

        .about-text {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 60px;
            font-style: normal;
            font-weight: 600;
            line-height: 112%;
            letter-spacing: -2px;
        }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            width: 100%;
            height: 100px;
            padding: 0 24px;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            z-index: 100;
            background: linear-gradient(0deg, #000 -58%, rgba(0, 0, 0, 0.00) 81.5%);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .logo {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 700;
            line-height: 100%;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .logo:hover {
            opacity: 0.6;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 200px;
            flex: 1 0 0;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-links a {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 500;
            line-height: 100%;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        .social-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
        }

        .social-links a:hover {
            opacity: 0.6;
        }

        /* Responsive */
        @media (min-width: 769px) {
            .content-wrapper,
            nav {
                padding-left: 4vw;
                padding-right: 4vw;
            }
        }

        @media (min-width: 1440px) {
            .content-wrapper,
            nav {
                padding-left: 6vw;
                padding-right: 6vw;
            }
        }

        @media (min-width: 1920px) {
            .content-wrapper,
            nav {
                padding-left: 8vw;
                padding-right: 8vw;
            }
        }

        @media (max-width: 1200px) {
            .about-text {
                font-size: 48px;
            }
        }

        @media (max-width: 768px) {
            .about-text {
                font-size: 36px;
                line-height: 120%;
            }

            .about-section {
                padding: 40px 0;
            }
        }

        @media (max-width: 600px) {
            .about-text {
                font-size: 28px;
            }

            nav {
                height: auto;
                padding: 24px;
            }

            .nav-container {
                flex-direction: column;
                gap: 24px;
                align-items: flex-start;
            }

            .nav-links {
                position: static;
                transform: none;
                gap: 32px;
            }

            .nav-links a {
                font-size: 18px;
            }

            .logo {
                font-size: 18px;
            }
        }
    </style>
</head>
