<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - EDDY.TION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FFF;
            color: #000;
            overflow-x: hidden;
            overflow-y: scroll;
        }

        .content-wrapper {
            padding: 0 24px;
        }

        /* Hero Image */
        .hero-image {
            width: 100%;
            aspect-ratio: 2520 / 1285;
            background: #D9D9D9;
            margin-bottom: 60px;
        }

        /* Project Info Section */
        .project-info-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 80px;
        }

        .project-title {
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 48px;
            font-style: normal;
            font-weight: 600;
            line-height: 112%;
            letter-spacing: -2px;
        }

        .project-meta {
            display: flex;
            align-items: flex-start;
            gap: 100px;
        }

        .meta-item {
            display: flex;
            width: 257px;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        .meta-label {
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-style: normal;
            font-weight: 500;
            line-height: 110%;
            letter-spacing: -0.5px;
        }

        .meta-value {
            color: #9C9C9C;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-style: normal;
            font-weight: 400;
            line-height: 121%;
            letter-spacing: -0.5px;
        }

        /* Gallery Section */
        .gallery-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 150px;
        }

        .gallery-image-full {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #D9D9D9;
        }

        .gallery-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .gallery-image-half {
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #D9D9D9;
        }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            width: 100%;
            height: 100px;
            padding: 0 24px;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            z-index: 100;
            background: linear-gradient(0deg, #FFF -58%, rgba(255, 255, 255, 0.00) 81.5%);
            transition: height 0.2s ease, padding 0.2s ease;
        }

        .nav-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            height: 100%;
            transition: gap 0.2s ease;
        }

        .logo {
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 700;
            line-height: 100%;
            text-decoration: none;
            justify-self: start;
            transition: font-size 0.2s ease;
        }

        .logo:hover {
            opacity: 0.6;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
            justify-self: center;
            transition: gap 0.2s ease;
        }

        .nav-links a {
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 500;
            line-height: 100%;
            text-decoration: none;
            transition: opacity 0.1s, font-size 0.2s ease;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        .social-links {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-self: end;
            transition: gap 0.2s ease;
        }

        .social-links a {
            color: #000;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .social-links svg {
            transition: width 0.2s ease, height 0.2s ease;
        }

        .social-links a:hover {
            opacity: 0.6;
        }

        /* Responsive */
        @media (min-width: 769px) {
            .content-wrapper,
            nav {
                padding-left: 4vw;
                padding-right: 4vw;
            }
        }

        @media (min-width: 1440px) {
            .content-wrapper,
            nav {
                padding-left: 6vw;
                padding-right: 6vw;
            }
        }

        @media (min-width: 1920px) {
            .content-wrapper,
            nav {
                padding-left: 8vw;
                padding-right: 8vw;
            }
        }

        @media (max-width: 1024px) {
            .project-title {
                font-size: 40px;
            }

            .nav-links {
                gap: 60px;
            }
        }

        @media (max-width: 900px) {
            .nav-links {
                gap: 40px;
            }
        }

        @media (max-width: 768px) {
            .hero-image {
                margin-bottom: 40px;
            }

            .project-info-section {
                margin-bottom: 60px;
            }

            .project-title {
                font-size: 32px;
            }

            .project-meta {
                gap: 40px;
            }

            .gallery-section {
                margin-bottom: 120px;
            }

            .nav-links {
                gap: 30px;
            }

            .nav-links a {
                font-size: 20px;
            }

            .logo {
                font-size: 20px;
            }

            .social-links svg {
                width: 26px;
                height: 26px;
            }
        }

        @media (max-width: 600px) {
            .hero-image {
            }

            .project-title {
                font-size: 28px;
            }

            .gallery-row {
                grid-template-columns: 1fr;
            }

            nav {
                height: auto;
                padding: 24px;
            }

            .nav-container {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .logo {
                justify-self: start;
            }

            .nav-links {
                gap: 24px;
                justify-self: start;
            }

            .social-links {
                justify-self: start;
            }

            .nav-links a {
                font-size: 16px;
            }

            .logo {
                font-size: 16px;
            }

            .social-links {
                gap: 12px;
            }

            .social-links svg {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Image -->
    <div class="hero-image"></div>

    <div class="content-wrapper">
        <!-- Project Info -->
        <section class="project-info-section">
            <h1 class="project-title">Decoding the Future of Innovation</h1>
            <div class="project-meta">
                <div class="meta-item">
                    <div class="meta-label">Categories</div>
                    <div class="meta-value">Graphic Design Illustration</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Date</div>
                    <div class="meta-value">2021. 10</div>
                </div>
            </div>
        </section>

        <!-- Gallery -->
        <section class="gallery-section">
            <div class="gallery-image-full"></div>
            <div class="gallery-row">
                <div class="gallery-image-half"></div>
                <div class="gallery-image-half"></div>
            </div>
            <div class="gallery-image-full"></div>
            <div class="gallery-image-full"></div>
        </section>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">EDDY.TION</a>
            <div class="nav-links">
                <a href="/work/">Work</a>
                <a href="/play/">Play</a>
                <a href="/about/">About</a>
            </div>
            <div class="social-links">
                <a href="https://www.instagram.com/eddy.tion__?igsh=MXY0am80M2VvcjB6eg%3D%3D&utm_source=qr" target="_blank" aria-label="Instagram">
                    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1.41075" y="1.41075" width="27.1785" height="27.1785" rx="7.01536" stroke="black" stroke-width="2.8215"/>
                        <circle cx="15.0095" cy="15.0098" r="6.37236" stroke="black" stroke-width="2.72553"/>
                        <circle cx="23.0326" cy="6.98662" r="1.81382" fill="black" stroke="black" stroke-width="0.0191939"/>
                    </svg>
                </a>
                <a href="https://www.linkedin.com/in/hwang-il-kim-9828a113b/" target="_blank" aria-label="LinkedIn">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="black"/>
                    </svg>
                </a>
            </div>
        </div>
    </nav>
</body>
</html>
