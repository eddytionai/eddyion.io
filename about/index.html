<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - EDDY.TION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            overflow-y: scroll;
        }

        .content-wrapper {
            padding: 0 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* About Section */
        .about-section {
            display: flex;
            width: 100%;
            padding: 73px 0;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            flex: 1;
        }

        .about-text {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 60px;
            font-style: normal;
            font-weight: 600;
            line-height: 112%;
            letter-spacing: -2px;
        }

        .about-text span {
            display: block;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease forwards;
        }

        .about-text span:nth-child(1) {
            animation-delay: 0s;
        }

        .about-text span:nth-child(2) {
            animation-delay: 0.1s;
        }

        .about-text span:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            width: 100%;
            height: 100px;
            padding: 0 24px;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            z-index: 100;
            background: linear-gradient(0deg, #000 -58%, rgba(0, 0, 0, 0.00) 81.5%);
            transition: height 0.3s ease, padding 0.3s ease;
        }

        .nav-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            height: 100%;
            transition: gap 0.3s ease;
        }

        .logo {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 700;
            line-height: 100%;
            text-decoration: none;
            transition: opacity 0.3s, font-size 0.3s ease;
            justify-self: start;
        }

        .logo:hover {
            opacity: 0.6;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
            justify-self: center;
            transition: gap 0.3s ease;
        }

        .nav-links a {
            color: #FFF;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 500;
            line-height: 100%;
            text-decoration: none;
            transition: opacity 0.3s, font-size 0.3s ease;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        .social-links {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-self: end;
            transition: gap 0.3s ease;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
        }

        .social-links a:hover {
            opacity: 0.6;
        }

        .social-links svg {
            transition: width 0.3s ease, height 0.3s ease;
        }

        /* Responsive */
        @media (min-width: 769px) {
            .content-wrapper,
            nav {
                padding-left: 4vw;
                padding-right: 4vw;
            }
        }

        @media (min-width: 1440px) {
            .content-wrapper,
            nav {
                padding-left: 6vw;
                padding-right: 6vw;
            }
        }

        @media (min-width: 1920px) {
            .content-wrapper,
            nav {
                padding-left: 8vw;
                padding-right: 8vw;
            }
        }

        @media (max-width: 1200px) {
            .about-text {
                font-size: 48px;
            }
        }

        @media (max-width: 1024px) {
            .nav-links {
                gap: 60px;
            }
        }

        @media (max-width: 900px) {
            .nav-links {
                gap: 40px;
            }
        }

        @media (max-width: 768px) {
            .about-text {
                font-size: 36px;
                line-height: 120%;
            }

            .about-section {
                padding: 40px 0;
            }

            .nav-links {
                gap: 30px;
            }

            .nav-links a {
                font-size: 20px;
            }

            .logo {
                font-size: 20px;
            }

            .social-links svg {
                width: 26px;
                height: 26px;
            }
        }

        @media (max-width: 600px) {
            .about-text {
                font-size: 28px;
            }

            nav {
                height: auto;
                padding: 24px;
            }

            .nav-container {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .logo {
                justify-self: start;
            }

            .nav-links {
                gap: 24px;
                justify-self: start;
            }

            .social-links {
                justify-self: start;
            }

            .nav-links a {
                font-size: 16px;
            }

            .logo {
                font-size: 16px;
            }

            .social-links {
                gap: 12px;
            }

            .social-links svg {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <!-- About Section -->
        <section class="about-section">
            <p class="about-text">
                <span>I have been planing and creating</span>
                <span>contents based on understanding</span>
                <span>brand essense.</span>
            </p>
        </section>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">EDDY.TION</a>
            <div class="nav-links">
                <a href="/work/">Work</a>
                <a href="/play/">Play</a>
                <a href="/about/">About</a>
            </div>
            <div class="social-links">
                <a href="https://www.instagram.com/eddy.tion__?igsh=MXY0am80M2VvcjB6eg%3D%3D&utm_source=qr" target="_blank" aria-label="Instagram">
                    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1.41075" y="1.41075" width="27.1785" height="27.1785" rx="7.01536" stroke="white" stroke-width="2.8215"/>
                        <circle cx="15.0095" cy="15.0098" r="6.37236" stroke="white" stroke-width="2.72553"/>
                        <circle cx="23.0326" cy="6.98662" r="1.81382" fill="white" stroke="white" stroke-width="0.0191939"/>
                    </svg>
                </a>
                <a href="https://www.linkedin.com/in/hwang-il-kim-9828a113b/" target="_blank" aria-label="LinkedIn">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="white"/>

            </div>
        </div>
    </nav>
</body>
</html>
